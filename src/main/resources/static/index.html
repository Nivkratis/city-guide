<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Путеводитель по городу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4ebf5 100%);
            min-height: 100vh;
            padding-top: 20px;
            padding-bottom: 40px;
        }
        .card {
            margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            border: none;
            border-radius: 12px;
            background-color: #ffffff;
        }
        .rating-badge {
            background-color: #ffc107;
            color: #000;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
        }
        h1 {
            color: #2c3e50;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center mb-4">Путеводитель по городу</h1>

    <div class="row">
        <div class="col-md-4">

            <div class="card card-body">
                <h5 class="card-title">Профиль (Вход / Регистрация)</h5>
                <div id="auth-form">
                    <input type="text" id="username" class="form-control mb-2" placeholder="Логин">
                    <input type="password" id="password" class="form-control mb-2" placeholder="Пароль">
                    <button onclick="authUser('/register')" class="btn btn-outline-secondary btn-sm w-100 mb-1">Зарегистрироваться</button>
                    <button onclick="authUser('/login')" class="btn btn-primary btn-sm w-100">Войти</button>
                </div>
                <div id="auth-status" class="text-success mt-2" style="display:none;"></div>
            </div>

            <div class="card card-body">
                <h5 class="card-title">Добавить новое место</h5>
                <input type="text" id="attr-name" class="form-control mb-2" placeholder="Название места">
                <input type="text" id="attr-category" class="form-control mb-2" placeholder="Категория (Музей, Парк, Кафе)">
                <input type="number" step="0.0001" id="attr-lat" class="form-control mb-2" placeholder="Широта (например, 59.9398)">
                <input type="number" step="0.0001" id="attr-lon" class="form-control mb-2" placeholder="Долгота (например, 30.3146)">
                <button onclick="addAttraction()" class="btn btn-success btn-sm w-100">Сохранить в БД</button>
            </div>
        </div>

        <div class="col-md-8">

            <div class="card card-body">
                <h5 class="card-title">ГИС-поиск достопримечательности в заданном радиусе</h5>
                <div class="row g-2">
                    <div class="col-md-2">
                        <label class="small text-muted">Широта</label>
                        <input type="number" step="0.0001" id="search-lat" class="form-control" placeholder="59.93">
                    </div>
                    <div class="col-md-2">
                        <label class="small text-muted">Долгота</label>
                        <input type="number" step="0.0001" id="search-lon" class="form-control" placeholder="30.31">
                    </div>
                    <div class="col-md-2">
                        <label class="small text-muted">Радиус (км)</label>
                        <input type="number" step="0.1" id="search-radius" class="form-control" placeholder="1.5">
                    </div>
                    <div class="col-md-2">
                        <label class="small text-muted">Мин. рейтинг</label>
                        <input type="number" step="0.1" min="0" max="5" id="search-rating" class="form-control" placeholder="0.0">
                    </div>
                    <div class="col-md-4">
                        <label class="small text-muted">Категория места</label>
                        <input type="text" id="search-category" class="form-control" placeholder="Все категории">
                    </div>
                </div>
                <div class="mt-3 d-flex gap-2">
                    <button onclick="searchAttractions()" class="btn btn-primary btn-sm flex-grow-1">Найти по ГИС</button>
                    <button onclick="loadAllAttractions()" class="btn btn-secondary btn-sm">Сбросить (Показать все)</button>
                </div>
            </div>

            <h4 class="mb-3 text-secondary">Достопримечательности</h4>
            <div id="attractions-list"></div>

        </div>
    </div>
</div>

<div class="modal fade" id="reviewsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal-attr-name">Отзывы</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="reviews-container" class="mb-3"></div>
                <hr>
                <h6>Оставить свой отзыв</h6>
                <input type="number" id="review-rating" class="form-control mb-2" min="1" max="5" placeholder="Оценка (1-5)">
                <textarea id="review-content" class="form-control mb-2" placeholder="Ваш отзыв (необязательно)..."></textarea>
                <button onclick="submitReview()" class="btn btn-primary btn-sm w-100">Отправить отзыв</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_BASE = '/api/v1';
    let currentUserId = null;
    let selectedAttractionId = null;
    let reviewsModal = null;

    document.addEventListener("DOMContentLoaded", () => {
        reviewsModal = new bootstrap.Modal(document.getElementById('reviewsModal'));
        loadAllAttractions();
    });

    async function authUser(endpoint) {
        const loginInput = document.getElementById('username').value.trim();
        const passwordInput = document.getElementById('password').value.trim();

        if (!loginInput || !passwordInput) {
            alert("Пожалуйста, заполните поля логина и пароля");
            return;
        }

        const response = await fetch(`${API_BASE}/users${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login: loginInput, password: passwordInput })
        });

        const data = await response.text();
        if (response.ok) {
            const user = JSON.parse(data);
            currentUserId = user.id;
            document.getElementById('auth-form').style.display = 'none';
            const statusDiv = document.getElementById('auth-status');
            statusDiv.style.display = 'block';
            statusDiv.innerText = `Вы вошли как: ${user.login} (ID: ${user.id})`;
        } else {
            alert("Ошибка: " + data);
        }
    }

    async function loadAllAttractions() {
        const response = await fetch(`${API_BASE}/attractions`);
        const attractions = await response.json();
        renderAttractions(attractions);
    }

    async function addAttraction() {
        const name = document.getElementById('attr-name').value;
        const category = document.getElementById('attr-category').value;
        const latitude = document.getElementById('attr-lat').value;
        const longitude = document.getElementById('attr-lon').value;

        if (!name || !category || !latitude || !longitude) {
            alert("Заполните все поля, включая категорию");
            return;
        }

        await fetch(`${API_BASE}/attractions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, category, latitude, longitude })
        });

        loadAllAttractions();
        document.getElementById('attr-name').value = '';
        document.getElementById('attr-category').value = '';
        document.getElementById('attr-lat').value = '';
        document.getElementById('attr-lon').value = '';
    }

    async function searchAttractions() {
        const lat = document.getElementById('search-lat').value;
        const lon = document.getElementById('search-lon').value;
        const radius = document.getElementById('search-radius').value;
        const category = document.getElementById('search-category').value;
        let minRating = document.getElementById('search-rating').value || 0.0;

        if (!lat || !lon || !radius) {
            alert("Заполните координаты и радиус поиска");
            return;
        }

        if (parseFloat(minRating) > 5.0) {
            alert("Ошибка: Оценка при поиске не может быть больше 5.0");
            document.getElementById('search-rating').value = 5.0;
            return;
        }

        if (parseFloat(minRating) < 0.0) {
            minRating = 0.0;
            document.getElementById('search-rating').value = 0.0;
        }

        const url = `${API_BASE}/attractions/search?lat=${lat}&lon=${lon}&radius=${radius}&minRating=${minRating}&category=${encodeURIComponent(category)}`;
        const response = await fetch(url);
        const attractions = await response.json();
        renderAttractions(attractions);
    }

    function renderAttractions(list) {
        const container = document.getElementById('attractions-list');
        container.innerHTML = '';
        if (list.length === 0) {
            container.innerHTML = '<div class="alert alert-warning">Ничего не найдено по вашему запросу</div>';
            return;
        }
        list.forEach(attr => {
            container.innerHTML += `
                <div class="card card-body d-flex flex-row justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1">
                            ${attr.name}
                            <span class="badge bg-secondary ms-2" style="font-size: 0.75rem;">${attr.category}</span>
                        </h5>
                        <small class="text-muted">Координаты: ${attr.latitude}, ${attr.longitude}</small>
                    </div>
                    <div class="text-end">
                        <span class="rating-badge mb-2 d-inline-block">${attr.averageRating.toFixed(2)}</span><br>
                        <button onclick="openReviewsModal(${attr.id}, '${attr.name}')" class="btn btn-outline-primary btn-sm">Отзывы</button>
                    </div>
                </div>
            `;
        });
    }

    async function openReviewsModal(id, name) {
        selectedAttractionId = id;
        document.getElementById('modal-attr-name').innerText = `Отзывы о: ${name}`;

        const response = await fetch(`${API_BASE}/reviews/attraction/${id}`);
        const reviews = await response.json();

        const container = document.getElementById('reviews-container');
        container.innerHTML = '';
        if (reviews.length === 0) {
            container.innerHTML = '<p class="text-muted">Отзывов пока нет. Будьте первым!</p>';
        } else {
            reviews.forEach(r => {
                const reviewText = r.content && r.content.trim() !== "" ? r.content : "<i>Без комментария</i>";
                container.innerHTML += `
                    <div class="p-2 mb-2 border-bottom" style="background: #fafafa;">
                        <strong>${r.user.login}</strong> <span class="badge bg-warning text-dark">★ ${r.rating}</span>
                        <p class="mb-0 text-secondary">${reviewText}</p>
                    </div>
                `;
            });
        }
        reviewsModal.show();
    }

    async function submitReview() {
        if (!currentUserId) {
            alert("Сначала авторизуйтесь или зарегистрируйтесь в левой панели");
            return;
        }
        const rating = document.getElementById('review-rating').value;
        const content = document.getElementById('review-content').value.trim();

        if (!rating) {
            alert("Пожалуйста, выберите оценку места");
            return;
        }

        if (parseInt(rating) < 1 || parseInt(rating) > 5) {
            alert("Оценка в отзыве должна быть от 1 до 5");
            return;
        }

        const url = `${API_BASE}/reviews/add?attractionId=${selectedAttractionId}&userId=${currentUserId}&content=${encodeURIComponent(content)}&rating=${rating}`;

        const response = await fetch(url, { method: 'POST' });
        if (response.ok) {
            document.getElementById('review-rating').value = '';
            document.getElementById('review-content').value = '';
            reviewsModal.hide();
            loadAllAttractions();
            alert("Отзыв успешно добавлен!");
        } else {
            const err = await response.text();
            alert("Ошибка: " + err);
        }
    }
</script>
</body>
</html>
